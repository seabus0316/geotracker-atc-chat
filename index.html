<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Geotracker atc-Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:#070b14; font-family:'Courier New', monospace; color:#c8d8ff; }
  #app { display:flex; flex-direction:column; height:100%; }

  /* ---- 登入畫面 ---- */
  .screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:14px; padding:20px; }
  .screen h2 { font-size:14px; letter-spacing:0.5px; margin:0 0 6px; }
  .btn { background:#5865F2; color:#fff; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px; }
  .btn.alt { background:#1d2440; border:1px solid #3a4a7a; }
  .role-row { display:flex; gap:10px; }
  .role-btn { width:120px; padding:14px 10px; border-radius:8px; border:1.5px solid #3a4a7a; background:#0d1228; color:#c8d8ff; cursor:pointer; font-family:inherit; font-size:12px; }
  .role-btn:hover { border-color:#5865F2; }
  input { background:#0d1228; border:1px solid #3a4a7a; color:#c8d8ff; padding:8px 10px; border-radius:6px; font-family:inherit; font-size:12px; width:220px; }

  /* ---- 聊天室 ---- */
  #chatHeader { padding:6px 10px; font-size:10px; background:rgba(13,18,40,0.9); border-bottom:1px solid rgba(58,74,122,0.6); display:flex; justify-content:space-between; }
  #messages { flex:1; overflow-y:auto; padding:8px; font-size:11px; display:flex; flex-direction:column; gap:4px; }
  .msg { padding:4px 6px; border-radius:5px; line-height:1.4; word-break:break-word; }
  .msg .who { font-weight:bold; margin-right:6px; }
  .msg.pilot .who { color:#4a9eff; }
  .msg.atc .who { color:#f5a623; }
  .msg.highlight { background:rgba(245,200,66,0.22); border:1px solid rgba(245,200,66,0.5); }
  #inputRow { display:flex; border-top:1px solid rgba(58,74,122,0.6); }
  #inputRow input { flex:1; border:none; border-radius:0; font-size:12px; }
  #inputRow button { background:#1d2440; color:#c8d8ff; border:none; padding:0 14px; cursor:pointer; font-family:inherit; }
</style>
</head>
<body>
<div id="app"><div class="screen"><h2>Loading...</h2></div></div>
<div id="loginOverlay" style="position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);">
  <button onclick="startLogin()" style="background:#5865F2;color:#fff;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;font-family:monospace;font-size:13px;">Login with Discord</button>
</div>
<script>
const SUPABASE_URL = "https://azkqdmcfmribiwcyfajh.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6a3FkbWNmbXJpYml3Y3lmYWpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTEyNTEsImV4cCI6MjA5ODEyNzI1MX0.9R5DUC6Y3BH53M_BRDfW_ZvZHpmoR3DhbApTufzuTG4";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(location.search);
const room = params.get('room') || '20013';

const app = document.getElementById('app');
let me = null; // { id, role, name, callsign }
let channel = null;

function render(html) { app.innerHTML = html; }
function startLogin() {
  const popup = window.open(
    'https://geotracker-atc-chat.vercel.app/?mode=login',
    '_blank', 'width=500,height=700'
  );
  window.addEventListener('message', async (e) => {
    if (e.data?.type === 'acars_login_done') {
      document.getElementById('loginOverlay').style.display = 'none';
      // 把 session 傳進 iframe
      document.getElementById('embedFrame').contentWindow.postMessage({
        type: 'acars_session',
        session: e.data.session
      }, 'https://geotracker-atc-chat.vercel.app');
    }
  }, { once: true });
}
// ---------- 1. 登入畫面 ----------
function showLogin() {
  render(`
    <div class="screen">
      <h2>&gt; Geotracker atc-chat LOGIN</h2>
      <button class="btn" id="discordBtn">Login by Discord</button>
    </div>`);

  // 聽 popup 傳回來的訊號
window.addEventListener('message', async (e) => {
  if (e.data?.type === 'acars_login_done' && e.data.session) {
    await sb.auth.setSession({
      access_token: e.data.session.access_token,
      refresh_token: e.data.session.refresh_token
    });
    init();
  }
}, { once: true });

document.getElementById('discordBtn').onclick = async () => {
    const { data } = await sb.auth.signInWithOAuth({
      provider: 'discord',
      options: {
        redirectTo: location.href.split('?')[0] + location.search,
        skipBrowserRedirect: true
      }
    });
    window.top.open(data.url, '_blank', 'width=500,height=700');
};
}

// ---------- 2. 身分選擇 ----------
function showRoleSelect(userId) {
  render(`
    <div class="screen">
      <h2>&gt; Who are you?</h2>
      <div class="role-row">
        <button class="role-btn" data-role="pilot">PILOT</button>
        <button class="role-btn" data-role="atc">ATC</button>
      </div>
    </div>`);
  document.querySelectorAll('.role-btn').forEach(btn => {
    btn.onclick = () => showProfileForm(userId, btn.dataset.role);
  });
}

// ---------- 3. 名字 / callsign 輸入 ----------
function showProfileForm(userId, role) {
  const placeholder = role === 'atc' ? 'e.g., RCTP_GND' : 'e.g., CAL123';
  render(`
    <div class="screen">
      <h2>&gt; ${role.toUpperCase()} INFO</h2>
      <input id="nameInput" placeholder="Name" maxlength="24">
      <input id="callsignInput" placeholder="Callsign (${placeholder})" maxlength="24">
      <button class="btn">Confirm</button>
    </div>`);
  app.querySelector('.btn').onclick = async () => {
    const name = document.getElementById('nameInput').value.trim();
    const callsign = document.getElementById('callsignInput').value.trim();
    if (!name || !callsign) return alert('Please fill in all fields.');
    const { error } = await sb.from('profiles').upsert({ id: userId, role, name, callsign });
    if (error) return alert('Failed to save: ' + error.message);
    me = { id: userId, role, name, callsign };
    enterChat();
  };
}

// ---------- 4. 聊天室 ----------
async function enterChat() {
  render(`
    <div id="chatHeader">
      <span>ROOM ${room} — ${me.name} [${me.callsign}] (${me.role.toUpperCase()})</span>
      <span style="cursor:pointer;color:#f5c842" id="logoutBtn">Logout</span>
    </div>
    <div id="messages"></div>
    <div id="inputRow">
      <input id="msgInput" placeholder="Enter message..." maxlength="240">
      <button id="sendBtn">Send</button>
    </div>`);

  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    location.reload();
  };

  const msgBox = document.getElementById('messages');

  function renderMessage(m) {
    const div = document.createElement('div');
    const isHighlight = m.role === 'atc'
      && me.role === 'pilot'
      && m.content.toLowerCase().includes(me.callsign.toLowerCase());
    div.className = 'msg ' + m.role + (isHighlight ? ' highlight' : '');
    div.innerHTML = `<span class="who">[${m.callsign}] ${m.name}:</span>${escapeHtml(m.content)}`;
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // 載入歷史訊息
  const { data: history } = await sb
    .from('messages')
    .select('*')
    .eq('room', room)
    .order('created_at', { ascending: true })
    .limit(100);
  (history || []).forEach(renderMessage);

  // 即時訂閱 //
  channel = sb.channel('room:' + room)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room=eq.${room}` },
      payload => renderMessage(payload.new))
    .subscribe();

  // 送出訊息
  const input = document.getElementById('msgInput');
  async function send() {
    const content = input.value.trim();
    if (!content) return;
    input.value = '';
    await sb.from('messages').insert({
      room, sender_id: me.id, role: me.role, name: me.name, callsign: me.callsign, content
    });
  }
  document.getElementById('sendBtn').onclick = send;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
}

// ---------- 啟動流程 ----------//
async function init() {
  const { data: { session } } = await sb.auth.getSession();

if (session && window.opener) {
    window.opener.postMessage({ 
      type: 'acars_login_done',
      session: session
    }, 'https://geotracker-atc-chat.vercel.app');  // 明確指定 origin
    window.close();
    return;
}

  // 沒有 opener 但有 session → 可能是 OAuth redirect 後的頁面，直接繼續
  if (!session) { showLogin(); return; }
  showRoleSelect(session.user.id);
}
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN') init();
});

init();
</script>
</body>
</html>
